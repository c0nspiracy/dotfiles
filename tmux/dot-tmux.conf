# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key -r C-a send-prefix

# press r to reload tmux conf
unbind r
bind-key r source-file ~/.tmux.conf

# saner bindings for splitting windows
unbind %
bind-key -N 'Split window horizontally' | split-window -h -c "#{pane_current_path}"
unbind '"'
bind-key -N 'Split window vertically' - split-window -v -c "#{pane_current_path}"

# resize panes with vim motions
bind-key -r h resize-pane -L 2
bind-key -r j resize-pane -D 2
bind-key -r k resize-pane -U 2
bind-key -r l resize-pane -R 2

# maximize panes with prefix + m
bind-key -r m resize-pane -Z

# clear the screen with prefix + C-l
bind-key C-l send-keys 'C-l'

set-option -g mouse on
unbind -Troot MouseDrag1Pane

set-option -g base-index 1
set-window-option -g pane-base-index 1

# set copy mode options
set-window-option -g mode-keys vi

# OSC 52 clipboard passthrough so copies from remote tmux reach the local Mac clipboard
set-option -g set-clipboard on

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel

# disable copying with the mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

bind-key S display-popup -E "tmux-sessionizer"
# bind-key C-f send-keys C-f

bind-key C-i display-popup -E "irb"

bind-key k display-popup -E "\
    tmux list-sessions -F '#{?session_attached,,#{session_name}}' |\
    sed '/^$/d' |\
    fzf --reverse -m --header=kill-session --preview 'tmux capture-pane -pet {}' |\
    xargs -I {} tmux kill-session -t {}"

# Ctrl+Space toggles outer tmux "off" (passthrough mode)
bind -T root C-Space \
    set prefix None \;\
    set key-table off \;\
    set status-style "fg=colour245,bg=colour238" \;\
    refresh-client -S

bind -T off C-Space \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    refresh-client -S

# run-shell '~/.tmux/fzf-git-tmux.sh'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v0.3.0'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'

# set -g @catppuccin_window_status "icon"
# set -g @catppuccin_window_status_style "rounded"
# set -g @catppuccin_window_default_text " #W"
# set -g @catppuccin_window_current_text " #W"

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory date_time battery"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{pane_current_path}"

set -g @batt_icon_status_attached '󰂃'

set -g status-position top
# set -g status-left ""
# set -g status-right-length 100
# set -g  status-right "#{E:@catppuccin_status_directory} "
# set -ag status-right "#{E:@catppuccin_status_date_time} "
# set -agF status-right "#{E:@catppuccin_status_battery}"

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB" # tell tmux that outside terminal supports true color

# Distinguish Ctrl-H from Backspace and Ctrl-J from Enter (needed for
# vim-tmux-navigator over SSH, where terminals collapse these by default).
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# Allow Yazi's image previews to work in tmux
# See: https://yazi-rs.github.io/docs/image-preview#tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g renumber-windows on    # renumber all windows when any window is closed
set -g detach-on-destroy off  # don't exit from tmux when closing a session

bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡️  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡️  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡️  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Initialize Tmux Plugin Manager (keep this line at the bottom)
run '~/.tmux/plugins/tpm/tpm'
